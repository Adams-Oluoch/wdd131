<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Review - Share Your Experience</title>
    <meta name="author" content="Jerrymac Adams Oluoch">
    <meta name="description" content="A product review form page showing good design principles, specific field requirements, and includes a submission confirmation with a counter.">
    <meta name="theme-color" content="#2C3E50">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&family=Playfair+Display:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles/form.css">
    <link rel="stylesheet" href="styles/form-large.css">
    <script src="scripts/form.js" defer></script>
</head>
<body>
    <header>
        <h1>About the Product - Review</h1>
    </header>
    
    <main>
        <form action="review.html" method="get" class="product-review-form" id="reviewForm">
            <!-- Product Name Field - Required -->
            <div class="form-group">
                <label for="productname">
                    Product <span class="required-indicator">*</span>
                </label>
                <select id="productname" name="productName" required>
                    <option value="" disabled selected>Select a product</option>
                </select>
            </div>

            <!-- Overall Rating Field - Required -->
            <div class="form-group">
                <label class="rating-label">
                    Please provide your rating from the options below - thank you! <span class="required-indicator">*</span>
                </label>
                <div class="star-rating">
                    <label for="rating1" class="rating-number">
                        <input type="radio" id="rating1" name="rating" value="1" required>
                        <span>1</span>
                    </label>
                    <label for="rating2" class="rating-number">
                        <input type="radio" id="rating2" name="rating" value="2" required>
                        <span>2</span>
                    </label>
                    <label for="rating3" class="rating-number">
                        <input type="radio" id="rating3" name="rating" value="3" required>
                        <span>3</span>
                    </label>
                    <label for="rating4" class="rating-number">
                        <input type="radio" id="rating4" name="rating" value="4" required>
                        <span>4</span>
                    </label>
                    <label for="rating5" class="rating-number">
                        <input type="radio" id="rating5" name="rating" value="5" required>
                        <span>5</span>
                    </label>
                </div>
            </div>

            <!-- Date of Installation Field - Required -->
            <div class="form-group">
                <label for="installDate">
                    Please Provide The Date of Installation <span class="required-indicator">*</span>
                </label>
                <input type="date" id="installDate" name="installDate" required>
            </div>

            <!-- Useful Features - Checkboxes -->
            <div class="form-group">
                <label class="features-label">What Features Are Demonstrated?</label>
                <div class="checkbox-group">
                    <label class="checkbox-option">
                        <input type="checkbox" name="features" value="durability">
                        <span>Durable</span>
                    </label>
                    <label class="checkbox-option">
                        <input type="checkbox" name="features" value="affordable">
                        <span>Affordable</span>
                    </label>
                    <label class="checkbox-option">
                        <input type="checkbox" name="features" value="highQuality">
                        <span>High Quality</span>
                    </label>
                    <label class="checkbox-option">
                        <input type="checkbox" name="features" value="easyToUse">
                        <span>Easy to Use</span>
                    </label>
                </div>
            </div>

            <!-- Written Review - Textarea (Optional) -->
            <div class="form-group">
                <label for="writtenReview">Please utilize this space to provide any comments</label>
                <textarea id="writtenReview" name="writtenReview" rows="6"></textarea>
            </div>

            <!-- User Name - Optional -->
            <div class="form-group">
                <label for="userName">Tell us who we can thank for leaving this review</label>
                <input type="text" id="userName" name="userName">
            </div>

            <!-- Submit Button -->
            <div class="form-group submit-group">
                <button type="submit" class="submit-btn">Provide my review</button>
            </div>
        </form>
    </main>

    <footer>
        <p>©️ <span class="currentyear"></span> Jerrymac Adams Oluoch | Kenya | Product Review Form</p>
        <p class="lastmodified"></p>
    </footer>
</body>
</html>
